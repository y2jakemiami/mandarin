<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Чат — AI Chinese</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- === LOADING SCREEN === -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loader">
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
        <div class="loader-text">Загрузка аватара</div>
        <div class="loader-progress"></div>
    </div>

    <!-- === VIDEO CALL PANEL === -->
    <div class="video-call-panel" id="videoCallPanel">
        <div class="video-call-header">
            <div class="call-status">
                <span class="call-status-dot"></span>
                <span id="callStatusText">Соединение...</span>
            </div>
            <button class="end-call-btn" id="endCallBtn">Завершить</button>
        </div>
        <div class="avatar-video-container">

            <!-- === БАЗОВЫЕ ВИДЕО === -->
            <video id="greetingVideo" playsinline preload="auto" muted class="active" data-video="hello.webm">
                <source src="./assets/videos/g_hello.webm" type="video/webm">
            </video>
            <video id="idleVideo" loop playsinline preload="auto" muted class="inactive" data-video="molchit.webm">
                <source src="./assets/videos/g_molchit.webm" type="video/webm">
            </video>
            <video id="thinkingVideo" loop playsinline preload="auto" muted class="inactive" data-video="think.webm">
                <source src="./assets/videos/g_think.webm" type="video/webm">
            </video>

            <!-- === ВИДЕО ГОВОРЕНИЯ С ЭМОЦИЯМИ === -->
            <video id="talkingCalmVideo" loop playsinline preload="auto" muted class="inactive" data-video="talking_calm.webm">
                <source src="./assets/videos/g_talking_calm.webm" type="video/webm">
            </video>
            <video id="talkingHappyVideo" loop playsinline preload="auto" muted class="inactive" data-video="talking_happy.webm">
                <source src="./assets/videos/g_talking_happy.webm" type="video/webm">
            </video>
            <video id="talkingSadVideo" loop playsinline preload="auto" muted class="inactive" data-video="talking_sad.webm">
                <source src="./assets/videos/g_talking_sad.webm" type="video/webm">
            </video>
            <video id="talkingSurprisedVideo" loop playsinline preload="auto" muted class="inactive" data-video="talking_surprised.webm">
                <source src="./assets/videos/g_talking_surprised.webm" type="video/webm">
            </video>
        </div>
    </div>

    <!-- Header -->
    <!-- Новый контейнер для прогресса XP -->
    <div class="xp-progress-container">
        <div class="xp-label" >XP:</div>
        <div class="xp-progress-bar">
            <div class="xp-progress-fill" id="xpProgressFill"></div>
        </div>
        <div class="xp-amount" id="currentXpDisplay">0/100</div>
    </div>
    <header class="chat-header">
        <a href='index.html'><button class="back-btn">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button></a>
        <div class="avatar-container">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
        </div>
        <div class="chat-info">
            <div class="chat-title" id="chatTitle">Загрузка...</div>
            <div class="chat-status" id="chatStatus">подключение к ИИ</div>
        </div>
        <button class="video-call-btn" id="videoCallBtn" title="Видеозвонок с аватаром">
            <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
        </button>
    </header>

    <!-- Messages Area -->
    <main class="messages-container" id="messagesContainer">
        <div class="message incoming" id="typingIndicator" style="display: none;">
            <div class="typing-indicator">
                <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
            </div>
        </div>
    </main>

    <!-- Task Buttons -->
    <div class="task-bar" id="taskBar">
        <div class="task-scroll">
            <!-- Режим 1: Диалог -->
            <button class="task-btn active" data-mode="dialog">
                <img src="./assets/icons/dialog_dark.png" alt="" class="task-icon">
                <span>Диалог</span>
            </button>
            
            <!-- Режим 2: Описание картинки -->
            <button class="task-btn" data-mode="image">
                <img src="image_ico.png" alt="" class="task-icon">
                <span>Описание картинки</span>
            </button>
            
            <!-- Режим 3: Грамматика -->
            <button class="task-btn" data-mode="grammar">
                <img src="icons/grammar_black.png" alt="" class="task-icon">
                <span>Грамматика</span>
            </button>
        </div>
    </div>

    <!-- Input Area -->
    <footer class="input-area">
        <input type="text" class="message-input" id="messageInput" placeholder="Сообщение..." autocomplete="off" >
        <button class="voice-btn" id="voiceBtn" hidden>
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <button class="send-btn" id="sendBtn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </footer>
</body>
<script src="./js/client.js"></script>
<script type="module" src="./js/main.js"></script>
<!-- <script src="script_chat_noBug.js"></script> -->
</html>
