<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    
    <!-- 📱 КРИТИЧНО ДЛЯ МОБИЛЬНЫХ БРАУЗЕРОВ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1C1C1E" media="(prefers-color-scheme: dark)">
    
    <title>Чат — AI Chinese</title>
    
    <!-- 🔤 ШРИФТЫ (preconnect ускоряет загрузку на 30-40%) -->
    <link rel="preconnect" href="https://assets/fonts.googleapis.com">
    <link rel="preconnect" href="https://assets/fonts.gstatic.com" crossorigin>
    <link href="https://assets/fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- 🎨 СТИЛИ -->
    <link rel="stylesheet" href="css/style2.css">
</head>
<body>
    <!-- ⏳ ЗАГРУЗОЧНЫЙ ЭКРАН -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loader">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
        </div>
        <div class="loader-text">Загрузка аватара</div>
        <div class="loader-progress"></div>
    </div>

    <!-- === 📹 VIDEO CALL PANEL (COMPACT) === -->
    <div class="video-call-panel" id="videoCallPanel" aria-hidden="true">
        <div class="video-call-header">
            <div class="call-status">
                <span class="call-status-dot"></span>
                <span id="callStatusText">Соединение...</span>
            </div>
            
            <!-- Кнопка с иконкой завершения звонка -->
            <button class="end-call-btn" id="endCallBtn" aria-label="Завершить звонок" title="Завершить звонок">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.73-1.68-1.36-2.66-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
                </svg>
            </button>
        </div>
        <div class="avatar-video-container">
            <!-- Базовые видео -->
            <video id="greetingVideo" playsinline preload="auto" muted class="active" data-video="hello.webm">
                <source src="./assets/videos/g_hello.webm" type="video/webm">
            </video>
            <video id="idleVideo" loop playsinline preload="auto" muted class="inactive" data-video="molchit.webm">
                <source src="./assets/videos/g_molchit.webm" type="video/webm">
            </video>
            <video id="thinkingVideo" loop playsinline preload="auto" muted class="inactive" data-video="think.webm">
                <source src="./assets/videos/g_think.webm" type="video/webm">
            </video>

            <!-- Видео с эмоциями -->
            <video id="talkingCalmVideo" loop playsinline preload="auto" muted class="inactive" data-video="talking_calm.webm">
                <source src="./assets/videos/g_talking_calm.webm" type="video/webm">
            </video>
            <video id="talkingHappyVideo" loop playsinline preload="auto" muted class="inactive" data-video="talking_happy.webm">
                <source src="./assets/videos/g_talking_happy.webm" type="video/webm">
            </video>
            <video id="talkingSadVideo" loop playsinline preload="auto" muted class="inactive" data-video="talking_sad.webm">
                <source src="./assets/videos/g_talking_sad.webm" type="video/webm">
            </video>
            <video id="talkingSurprisedVideo" loop playsinline preload="auto" muted class="inactive" data-video="talking_surprised.webm">
                <source src="./assets/videos/g_talking_surprised.webm" type="video/webm">
            </video>
        </div>
    </div>

    <!-- 📋 ШАПКА ЧАТА -->
    <header class="chat-header">
        <a href="index.html" aria-label="Назад">
            <button class="back-btn" aria-label="На главную">
                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
        </a>
        
        <div class="avatar-container" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
        </div>
        
        <div class="chat-info">
            <div class="chat-title" id="chatTitle">Загрузка...</div>
            <div class="chat-status" id="chatStatus">подключение к ИИ</div>
            
            <!-- 📊 XP ПРОГРЕСС (перемещён сюда для корректного flex-расклада) -->
            <div class="xp-progress-container">
                <div class="xp-progress-bar">
                    <div class="xp-progress-fill" id="xpProgressFill"></div>
                </div>
                <div class="xp-amount" id="currentXpDisplay">0/100</div>
            </div>
        </div>
        
        <button class="video-call-btn" id="videoCallBtn" aria-label="Видеозвонок с аватаром">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
        </button>
    </header>

    <!--  ОБЛАСТЬ СООБЩЕНИЙ -->
    <main class="messages-container" id="messagesContainer">
        <div class="message incoming" id="typingIndicator" style="display: none;" aria-hidden="true">
            <div class="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>
    </main>

    <!-- 🎯 ПАНЕЛЬ ЗАДАЧ -->
    <nav class="task-bar" id="taskBar" aria-label="Режимы чата">
        <div class="task-scroll">
            <button class="task-btn-magic" data-mode="magic" aria-pressed="false">
                 <img width="18px" src="./assets/icons/magic-wand (1).png" alt="" class="magic-icon" loading="lazy">
            </button>
            <button class="task-btn active" data-mode="dialog" aria-pressed="true">
                <img src="./assets/icons/dialog_dark.png" alt="" class="task-icon" loading="lazy">
                <span>Диалог</span>
            </button>
            
            <button class="task-btn" data-mode="image" aria-pressed="false">
                <img src="./assets/icons/image-svgrepo-com.svg" alt="" class="task-icon" loading="lazy">
                <span>Описание картинки</span>
            </button>
        </div>
    </nav>

    <!-- ⌨️ ПОЛЕ ВВОДА -->
    <footer class="input-area">
        <input 
            type="text" 
            class="message-input" 
            id="messageInput" 
            placeholder="Сообщение..." 
            autocomplete="off" 
            autocapitalize="off"
            enterkeyhint="send"
            aria-label="Поле ввода сообщения"
        >
        <button class="voice-btn" id="voiceBtn" aria-label="Голосовой ввод">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <button class="send-btn" id="sendBtn" aria-label="Отправить сообщение">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </footer>

    <script src="./js/client.js"></script>

    <!--  СКРИПТ ФИКСА ВЫСОТЫ ДЛЯ СТАРЫХ МОБИЛЬНЫХ БРАУЗЕРОВ -->
    <script>
        (function() {
            function setVh() {
                const vh = window.innerHeight * 0.01;
                document.documentElement.style.setProperty('--vh', `${vh}px`);
            }
            setVh();
            window.addEventListener('resize', setVh);
            window.addEventListener('orientationchange', () => setTimeout(setVh, 100));
        })();
    </script>
    
    <!-- 📦 ОСНОВНАЯ ЛОГИКА -->
    <script type="module" src="./js/main.js"></script>
</body>
</html>
